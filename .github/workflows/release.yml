name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    # Skip release/chore commits to prevent loops
    if: "!startsWith(github.event.head_commit.message, 'release:') && !startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # Safety net
      - run: bun run typecheck
      - name: Statusline smoke test
        run: |
          output=$(echo '{}' | bun run src/statusline/index.ts)
          if [ -z "$output" ]; then
            echo "::error::Statusline produced no output"
            exit 1
          fi

      # Detect next version (no side effects)
      - name: Detect version
        id: version
        run: |
          result=$(bun run scripts/release.ts detect 2>&1) && rc=0 || rc=$?
          echo "$result"
          if echo "$result" | grep -q "SKIP_RELEASE"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ $rc -ne 0 ]; then
            echo "::error::release.ts detect failed with exit code $rc"
            exit $rc
          else
            # detect outputs: "1.1.0 minor"
            line=$(echo "$result" | tail -1)
            version=$(echo "$line" | awk '{print $1}')
            bump=$(echo "$line" | awk '{print $2}')
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "bump=$bump" >> "$GITHUB_OUTPUT"
          fi

      # Tag the merge commit directly and push tag
      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # Create GitHub Release
      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      # Open PR with version bump + CHANGELOG
      - name: Create version bump PR
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          bump="${{ steps.version.outputs.bump }}"
          branch="release/${tag}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          bun run scripts/release.ts "$bump"
          git push origin "$branch"

          gh pr create \
            --title "chore(release): ${tag}" \
            --body "$(cat <<EOF
          Automated version bump and CHANGELOG update for **${tag}**.

          - Bumps version to \`${version}\` in package.json, plugin.json, marketplace.json
          - Updates CHANGELOG.md from conventional commits

          > Auto-generated by the release workflow.
          EOF
          )"
